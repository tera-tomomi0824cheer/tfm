<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0F172A"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./icon-192.png"><title>TFM</title><style>
:root{--bg:#0F172A;--card:#1E293B;--card2:#172033;--teal:#0F766E;--teal2:#14B8A6;--white:#F8FAFC;--muted:#94A3B8;--line:#334155}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--white)}header{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.94);backdrop-filter:blur(12px);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line)}header h1{margin:0;font-size:20px;text-align:center}main{max-width:680px;margin:auto;padding:16px 14px 100px}.page{display:none}.page.active{display:block}.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 10px 24px rgba(0,0,0,.18)}.hero{background:linear-gradient(135deg,var(--teal),#115E59)}.eyebrow{font-size:12px;color:#CCFBF1}.big{font-size:30px;font-weight:800;margin-top:4px}.muted{color:var(--muted);font-size:13px}.section-title{font-size:15px;font-weight:800;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mini{padding:14px}.mini .big{font-size:22px}nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:#0B1220;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}nav button{background:transparent;border:0;color:var(--muted);padding:9px 2px;font-size:11px}nav button.active{color:#5EEAD4;font-weight:800}.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.cal-head button{background:#243246;color:white;border:1px solid var(--line);border-radius:10px;padding:7px 11px}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.dow,.day{text-align:center;font-size:12px;padding:8px 0}.dow{color:var(--muted)}.day{background:#172033;border:1px solid #26364d;border-radius:10px;min-height:44px}.day.today{outline:2px solid var(--teal2)}.action{width:100%;display:flex;align-items:center;justify-content:space-between;background:#172033;border:1px solid var(--line);border-radius:16px;color:white;padding:16px;margin-bottom:10px;font-size:16px}textarea{width:100%;background:#101827;border:1px solid var(--line);border-radius:14px;color:white;padding:13px;font-size:16px;min-height:120px}.primary{width:100%;border:0;border-radius:14px;background:var(--teal);color:white;padding:14px;font-size:16px;font-weight:800;margin-top:10px}.bubble{padding:12px 14px;border-radius:16px;margin:8px 0;max-width:88%}.fin{background:#16343a}.user{background:#243246;margin-left:auto}.status{background:#172033;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
</style></head><body><header><h1>TFM</h1></header><main>
<section id="home" class="page active"><div class="card hero"><div class="eyebrow">Tomo Finance Manager</div><div class="big">¥0</div><div class="muted" style="color:#D5F5EF">今月働いた金額</div></div><div class="grid"><div class="card mini"><div class="muted">入金予定</div><div class="big">¥0</div></div><div class="card mini"><div class="muted">実入金</div><div class="big">¥0</div></div></div><div class="card"><div class="section-title">今年の年収見込み</div><div class="big">¥0</div><div class="muted">Sprint 2以降で自動集計を追加します</div></div><div class="card"><div class="section-title">次の入金</div><div class="status"><div class="muted">未登録</div></div></div></section>
<section id="calendar" class="page"><div class="card"><div class="cal-head"><button id="prevMonth">‹</button><strong id="monthLabel"></strong><button id="nextMonth">›</button></div><div class="cal-grid" id="calendarGrid"></div></div></section>
<section id="input" class="page"><div class="card"><div class="section-title">何を入力しますか？</div><button class="action"><span>🏢 事務所</span><span>›</span></button><button class="action"><span>📣 USA</span><span>›</span></button><button class="action"><span>🏫 秦野高校</span><span>›</span></button><button class="action"><span>🎀 FLAPPERS</span><span>›</span></button><button class="action"><span>💰 入金</span><span>›</span></button><div class="muted">各フォームはSprint 2で接続します</div></div></section>
<section id="fin" class="page"><div class="card"><div class="section-title">🤖 Fin</div><div class="bubble fin">こんにちは、友美さん。今日は何を入力しますか？</div><div id="chat"></div><textarea id="finInput" placeholder="例：今日は事務所9時〜18時、15分残業！"></textarea><button id="sendFin" class="primary">送信</button><div class="muted" style="margin-top:10px">Sprint 1ではチャットUIのみ。次のSprintで簡易解析を追加します。</div></div></section>
<section id="settings" class="page"><div class="card"><div class="section-title">設定</div><div class="status"><strong>テーマ</strong><div class="muted">ダーク・ティール</div></div><div class="status"><strong>保存方式</strong><div class="muted">このiPhone内</div></div><div class="status"><strong>オフライン</strong><div class="muted" id="offlineStatus">確認中...</div></div><div class="status"><strong>バージョン</strong><div class="muted">v0.1.0-alpha / Sprint 1</div></div></div></section>
</main><nav><button data-page="home" class="active">🏠<br>ホーム</button><button data-page="calendar">📅<br>カレンダー</button><button data-page="input">＋<br>入力</button><button data-page="fin">🤖<br>Fin</button><button data-page="settings">⚙️<br>設定</button></nav><script>
const buttons=[...document.querySelectorAll('nav button')];buttons.forEach(b=>b.onclick=()=>{buttons.forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(b.dataset.page).classList.add('active');scrollTo(0,0)});let current=new Date();function draw(){let y=current.getFullYear(),m=current.getMonth();monthLabel.textContent=`${y}年 ${m+1}月`;let first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();let names=['日','月','火','水','木','金','土'];calendarGrid.innerHTML=names.map(n=>`<div class="dow">${n}</div>`).join('');for(let i=0;i<first;i++)calendarGrid.innerHTML+='<div></div>';let t=new Date();for(let d=1;d<=days;d++){let it=y===t.getFullYear()&&m===t.getMonth()&&d===t.getDate();calendarGrid.innerHTML+=`<div class="day ${it?'today':''}">${d}</div>`}}prevMonth.onclick=()=>{current=new Date(current.getFullYear(),current.getMonth()-1,1);draw()};nextMonth.onclick=()=>{current=new Date(current.getFullYear(),current.getMonth()+1,1);draw()};draw();let chats=JSON.parse(localStorage.getItem('tfm_fin_chat')||'[]');function rc(){chat.innerHTML=chats.map(x=>`<div class="bubble user">${x}</div><div class="bubble fin">受け取りました。次のSprintで登録候補を作ります。</div>`).join('')}sendFin.onclick=()=>{let v=finInput.value.trim();if(!v)return;chats.push(v);localStorage.setItem('tfm_fin_chat',JSON.stringify(chats));finInput.value='';rc()};rc();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').then(()=>offlineStatus.textContent='対応済み').catch(()=>offlineStatus.textContent='登録失敗');else offlineStatus.textContent='未対応';
</script></body></html>
